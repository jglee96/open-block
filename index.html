<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Block</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        cursor: none;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        background: rgba(0,0,0,0.6);
        color: #fff;
        font-family: monospace;
        font-size: 18px;
        pointer-events: none;
        user-select: none;
      }
      #overlay.hidden { display: none; }
      #overlay h1 { font-size: 32px; letter-spacing: 2px; }
      #overlay p  { font-size: 14px; opacity: 0.7; }
      #crosshair {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 24px;
        font-family: monospace;
        pointer-events: none;
        display: none;
        text-shadow: 1px 1px 2px black;
      }
      #hud {
        position: fixed;
        top: 10px; left: 10px;
        color: #fff;
        font-family: monospace;
        font-size: 13px;
        pointer-events: none;
        text-shadow: 1px 1px 2px black;
        display: none;
      }
      #hotbar {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        gap: 4px;
        flex-direction: row;
        user-select: none;
        pointer-events: none;
      }
      #hotbar .slot {
        width: 50px;
        height: 50px;
        background: rgba(0,0,0,0.5);
        border: 2px solid rgba(255,255,255,0.3);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        padding-bottom: 3px;
        position: relative;
        border-radius: 3px;
      }
      #hotbar .slot::before {
        content: "";
        width: 32px;
        height: 32px;
        background: var(--block-color, #888);
        border-radius: 2px;
        position: absolute;
        top: 6px;
      }
      #hotbar .slot.selected {
        border-color: #fff;
        border-width: 3px;
        background: rgba(255,255,255,0.15);
      }
      #hotbar .slot.depleted::before {
        opacity: 0.35;
      }
      #hotbar .slot.empty::before {
        opacity: 0.12;
      }
      #hotbar .slot-name {
        font-family: monospace;
        font-size: 8px;
        color: #fff;
        text-shadow: 1px 1px 1px #000;
        position: relative;
        z-index: 1;
      }
      #inventory-panel {
        position: fixed;
        inset: 4vh 6vw;
        display: none;
        grid-template-columns: 1.1fr 1fr;
        align-items: start;
        gap: 16px;
        padding: 20px;
        max-height: 92vh;
        overflow: hidden;
        background: rgba(12, 16, 20, 0.92);
        color: #f0f4f8;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 12px;
        font-family: monospace;
        z-index: 10;
      }
      #inventory-panel.visible {
        display: grid;
      }
      .panel-card {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 10px;
        padding: 14px;
      }
      .panel-card h2 {
        font-size: 15px;
        margin-bottom: 10px;
        letter-spacing: 0.04em;
      }
      .panel-card p {
        font-size: 12px;
        line-height: 1.5;
        opacity: 0.8;
      }
      .inventory-grid,
      .recipe-list,
      .action-list,
      .checklist-list {
        display: grid;
        gap: 8px;
        min-height: 0;
        overflow-y: auto;
        padding-right: 4px;
      }
      .inventory-grid {
        max-height: 56vh;
      }
      .recipe-list {
        max-height: 32vh;
      }
      #furnace-panel,
      #action-list,
      #checklist-list {
        max-height: 18vh;
      }
      .inventory-row,
      .recipe-row,
      .action-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 10px;
        background: rgba(255,255,255,0.03);
        border-radius: 8px;
        min-height: 38px;
      }
      .inventory-row.empty-state,
      .recipe-row.disabled,
      .action-row.disabled {
        opacity: 0.45;
      }
      .recipe-row button,
      .action-row button {
        border: 1px solid rgba(255,255,255,0.16);
        background: rgba(255,255,255,0.08);
        color: inherit;
        border-radius: 6px;
        padding: 6px 10px;
        font-family: inherit;
        cursor: pointer;
      }
      .recipe-row button:disabled,
      .action-row button:disabled {
        cursor: not-allowed;
        opacity: 0.4;
      }
      .panel-meta {
        font-size: 11px;
        opacity: 0.7;
        margin-top: 8px;
      }
      .panel-columns {
        display: grid;
        gap: 16px;
        align-content: start;
        min-height: 0;
      }
      .checklist-row {
        display: grid;
        gap: 6px;
        padding: 8px 10px;
        background: rgba(255,255,255,0.03);
        border-radius: 8px;
      }
      .checklist-row.done {
        border-left: 3px solid #7aa83f;
      }
      .checklist-row.active {
        border-left: 3px solid #d4b15a;
      }
      .checklist-row.todo {
        border-left: 3px solid rgba(255,255,255,0.15);
      }
      .checklist-header {
        display: flex;
        gap: 8px;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" data-testid="game-canvas"></canvas>
    <div id="overlay" data-testid="overlay">
      <h1>Open Block</h1>
      <p>Click to start · WASD move · Space jump · 1-9 hotbar · LMB break/attack · RMB place/interact · E inventory</p>
      <p id="status" data-testid="status">Initializing WebGPU...</p>
    </div>
    <div id="inventory-panel" data-testid="inventory-panel" aria-hidden="true">
      <section class="panel-card">
        <h2>Inventory</h2>
        <div id="inventory-grid" data-testid="inventory-grid" class="inventory-grid"></div>
        <p class="panel-meta">Break logs by hand, turn them into planks, then unlock your first pickaxe.</p>
      </section>
      <div class="panel-columns">
        <section class="panel-card">
          <h2>Crafting</h2>
          <div id="recipe-list" data-testid="recipe-list" class="recipe-list"></div>
        </section>
        <section class="panel-card">
          <h2>Furnace</h2>
          <div id="furnace-panel" data-testid="furnace-panel" class="action-list"></div>
        </section>
        <section class="panel-card">
          <h2>Actions</h2>
          <div id="action-list" data-testid="action-list" class="action-list"></div>
        </section>
        <section class="panel-card">
          <h2>Checklist</h2>
          <div id="checklist-list" data-testid="checklist-list" class="checklist-list"></div>
        </section>
      </div>
    </div>
    <div id="crosshair" data-testid="crosshair">+</div>
    <div id="hud" data-testid="hud">
      <div id="pos">Position: 0, 0, 0</div>
      <div id="chunks">Chunks: 0</div>
    </div>
    <div id="hotbar">
      <div class="slot" data-key="1"><span class="slot-name"></span></div>
      <div class="slot" data-key="2"><span class="slot-name"></span></div>
      <div class="slot" data-key="3"><span class="slot-name"></span></div>
      <div class="slot" data-key="4"><span class="slot-name"></span></div>
      <div class="slot" data-key="5"><span class="slot-name"></span></div>
      <div class="slot" data-key="6"><span class="slot-name"></span></div>
      <div class="slot" data-key="7"><span class="slot-name"></span></div>
      <div class="slot" data-key="8"><span class="slot-name"></span></div>
      <div class="slot" data-key="9"><span class="slot-name"></span></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
